<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Тёмная стеклянная «пилюля» (иконочный холст) + янтарный микрофон, без текста. -->
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#191922"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffca94"/>
      <stop offset="1" stop-color="#ffb877"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="236" height="236" rx="54" fill="url(#glass)"
        stroke="#ffffff" stroke-opacity="0.09" stroke-width="2"/>
  <rect x="10" y="10" width="236" height="236" rx="54" fill="url(#sheen)"/>

  <!-- микрофон -->
  <g fill="none" stroke="url(#amber)" stroke-width="13" stroke-linecap="round">
    <path d="M82 122 V140 A46 46 0 0 0 174 140 V122"/>
    <path d="M128 186 V204"/>
    <path d="M100 204 H156"/>
  </g>
  <rect x="98" y="56" width="60" height="94" rx="30" fill="url(#amber)"/>
</svg>
