name: Ошибка / Bug report
description: Сообщить об ошибке Voice Input / Report a Voice Input bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Не публикуйте пароли, токены и другие секреты.
        Do not post passwords, tokens or other secrets.

  - type: input
    id: system
    attributes:
      label: Система / System
      placeholder: Windows 11 24H2, CachyOS, Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Версия Voice Input / Voice Input version
      placeholder: 0.1.0
    validations:
      required: true

  - type: input
    id: desktop
    attributes:
      label: Окружение / Desktop
      placeholder: Windows, Hyprland, GNOME, KDE Plasma
    validations:
      required: true

  - type: dropdown
    id: session
    attributes:
      label: Сеанс / Session
      options:
        - Windows
        - Wayland
        - X11
        - Не знаю / Not sure
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Диагностика / Diagnostics
      description: Windows — `%LOCALAPPDATA%\Voice Input\logs\voice-input.log`; Linux — вывод `voice-input --diag`.
      render: shell

  - type: textarea
    id: problem
    attributes:
      label: Что произошло / What happened
      description: Что вы делали, чего ожидали и что получили.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Логи / Logs
      description: Добавьте связанные ошибки или полный лог, если он не помещается выше.
      render: shell
