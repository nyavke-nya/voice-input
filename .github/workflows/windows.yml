name: Windows

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      variant:
        description: "Сборка: gpu (с CUDA-рантаймом, ~1.5 ГБ) или cpu (лёгкая)"
        type: choice
        options: [gpu, cpu]
        default: gpu

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 70
    env:
      PYTHONPATH: .
      QT_QPA_PLATFORM: offscreen
      # пусто, если секрет не задан -> сборка идёт unsigned
      SIGN_PFX_BASE64: ${{ secrets.SIGN_PFX_BASE64 }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Platform-independent tests + lint
        shell: bash   # bash на GitHub = set -eo pipefail: любой упавший тест валит job
        run: |
          python -m pip install --upgrade pip ruff
          ruff check pill tests
          python -m compileall -q pill tests
          python tests/test_config.py
          python tests/test_hotkey_parse.py
          python tests/test_stats.py
          python tests/test_stt_filter.py
          python tests/test_vad_gate.py
          python tests/test_vocab.py
          python tests/test_paths.py
          python tests/test_main.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Decode signing certificate (optional)
        if: ${{ env.SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $p = "$env:RUNNER_TEMP\sign.pfx"
          [IO.File]::WriteAllBytes($p, [Convert]::FromBase64String($env:SIGN_PFX_BASE64))
          "PILL_PFX=$p" | Out-File $env:GITHUB_ENV -Append

      - name: Build VoiceInput.exe + installer
        shell: pwsh
        env:
          PILL_PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
          VARIANT: ${{ github.event.inputs.variant }}   # через env (без инъекции в скрипт)
        run: |
          # push/PR -> быстрая CPU-сборка (шейкдаун пайплайна). GPU — ручной
          # workflow_dispatch (там default=gpu). whitelist на два значения.
          $variant = if ($env:VARIANT -eq "gpu") { "gpu" } else { "cpu" }
          Write-Host "variant=$variant"
          & packaging\windows\build.ps1 -Gpu:($variant -eq "gpu")

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInputSetup
          path: dist/VoiceInputSetup.exe
          if-no-files-found: error
          retention-days: 14
