name: Windows

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 70
    env:
      PYTHONPATH: .
      QT_QPA_PLATFORM: offscreen
      # пусто, если секрет не задан -> сборка идёт unsigned
      SIGN_PFX_BASE64: ${{ secrets.SIGN_PFX_BASE64 }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip

      - name: Windows PowerShell 5.1 scripts
        shell: powershell
        run: |
          foreach ($script in Get-ChildItem packaging\windows\*.ps1) {
            $bytes = [IO.File]::ReadAllBytes($script.FullName)
            if ($bytes.Length -lt 3 -or $bytes[0] -ne 0xEF -or $bytes[1] -ne 0xBB -or $bytes[2] -ne 0xBF) {
              throw "$($script.Name): UTF-8 BOM is required by Windows PowerShell 5.1"
            }
            $tokens = $null
            $parseErrors = $null
            [Management.Automation.Language.Parser]::ParseFile(
              $script.FullName, [ref]$tokens, [ref]$parseErrors
            ) | Out-Null
            if ($parseErrors.Count) {
              $parseErrors | ForEach-Object { Write-Error $_ }
              throw "$($script.Name): PowerShell syntax error"
            }
          }
          & powershell.exe -NoProfile -ExecutionPolicy Bypass -File `
            packaging\windows\build.ps1 -ValidateOnly
          if ($LASTEXITCODE -ne 0) { throw "Windows PowerShell parameter binding failed" }

      - name: Source check
        shell: bash
        run: |
          python -m pip install --upgrade pip ruff PySide6
          ruff check pill
          python -m compileall -q pill
          python -m py_compile packaging/windows/voice_input.py packaging/windows/voice_input.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Decode signing certificate (optional)
        if: ${{ env.SIGN_PFX_BASE64 != '' }}
        shell: pwsh
        run: |
          $p = "$env:RUNNER_TEMP\sign.pfx"
          [IO.File]::WriteAllBytes($p, [Convert]::FromBase64String($env:SIGN_PFX_BASE64))
          "PILL_PFX=$p" | Out-File $env:GITHUB_ENV -Append

      - name: Build VoiceInput.exe + installer
        shell: pwsh
        env:
          PILL_PFX_PASSWORD: ${{ secrets.SIGN_PFX_PASSWORD }}
        run: |
          & packaging\windows\build.ps1

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: VoiceInputSetup
          path: dist/VoiceInputSetup.exe
          if-no-files-found: error
          retention-days: 14

      # Пуш тега vX.Y.Z -> публикуем Release с установщиком и его SHA-256
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(sha256sum dist/VoiceInputSetup.exe | cut -d' ' -f1)
          gh release create "$GITHUB_REF_NAME" dist/VoiceInputSetup.exe \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "VoiceInputSetup.exe SHA-256: \`$sha\`" \
          || gh release upload "$GITHUB_REF_NAME" dist/VoiceInputSetup.exe \
            --repo "$GITHUB_REPOSITORY" --clobber
