name: Checks

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.14"]

    env:
      PILL_NO_AUTOSTART: "1"
      PYTHONPATH: .
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libdbus-1-3 libegl1 libfontconfig1 libgl1 \
            libglib2.0-0 libgssapi-krb5-2 libportaudio2 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 shellcheck

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt ruff
          python -m pip check

      - name: Check source
        run: |
          python -m compileall -q pill
          ruff check pill
          shellcheck install.sh uninstall.sh run.sh voice-input
          bash -n install.sh uninstall.sh run.sh voice-input
          sh -n run.sh voice-input
          /bin/sh ./install.sh --dry-run --skip-model >/dev/null
          ./uninstall.sh --dry-run
